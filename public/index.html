<div class="imgdiv"style="background-color:white">
<img src="rec.jpg"id="first"style="display:inline;width:500px;height:100%;margin-left:20px;margin-top:15px">
<img src="waste.jpg"id="second"style="display:inline;width:500px;height;100%;;margin-left:200px;">
</div>

<div id="root" style="height:500px; color: black;background-color: white;">
  <form>
    <caption><b>User's Details</b></caption><br><br>
    <label> Name : </label>
    <input type="text" name="name"placeholder="Enter your name"><br><br>
    <label> Phone/Mobile :</label>
    <input type="number" name="mobile" placeholder = "Enter your mobile num.."><br><br>
    <label>Gender : </label>
    <input type="radio" name="gender"value="male">male
    <input type="radio" name="gender"value="female">female
    <input type="radio" name="gender" value="other">Other<br><br>
    <label>Email:</label>
    <input type="email" name="email"placeholder="Enter your email"required><br><br>
    <label>Garbage Type :</label>
    <input type="checkbox" name="type" value="plastic">plastic
    <input type="checkbox" name="type" value="organic">organic-waste 
    <input type="checkbox" name="type" value="Household ">Household-waste
    <input type="checkbox" name="type" value="mixed">Mixed waste<br><br>

    <label>Location :</label>
<select>
    <option>Sabjimandi</option>
    <option>janaki Tol</option>
    <option>bhasi</option>
    <option>Bhagatpur</option>
</select><br><br>
<label>Location Description</label>
<input type="text" name="description"><br><br>
<input type="file"name ="file"><br><br>
<input type="submit" name="button ">
</form>
</div>
<div class="login-form" style="height: 50vh; width: 29vh;background-color: aliceblue;justify-content: center;text-align: center;margin-left: 50%;">
  <form>
      <div style="margin-top: 20px;justify-content: center;text-align: center;">
     <input type="email/number" name="email"placeholder="Email/phone"required><br><br>
     <input type="password"name="password"placeholder="password"required><br><br>
     <button>login</button>
  </div>
  </form>
</div>
<div class="footer"style="height:100px;background-color: green">

</div>
